apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app-python-deployment
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-app
  template:
    metadata:
      labels:
        app: ecommerce-app
    spec:
      containers:
      - name: ecommerce-app
        image: 197710836808.dkr.ecr.us-east-1.amazonaws.com/fastapi-app:1.0
        ports:
        - containerPort: 8000                                                                                